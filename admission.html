
<html><head><link rel="stylesheet" href="css/style.css"></head><body>
<div class="section">
<h2>Admission Form</h2>
<form id="f">
<input placeholder="Student Name" required>
<input placeholder="Class" required>
<input placeholder="Parent Name" required>
<input placeholder="Phone" required>
<textarea placeholder="Address"></textarea>
<button>Submit</button>
</form>
<p id="msg"></p>
</div>
<script>
document.getElementById("f").onsubmit=function(e){
e.preventDefault();
document.getElementById("msg").innerText="Admission Submitted!";
}
</script>
</body></html>
